; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:m5paper]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
extra_scripts = pre:tools/patch_m5epd.py
board_build.filesystem = littlefs
board_build.partitions = partitions-m5paper.csv
board_build.f_cpu = 240000000L
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.psram = enabled
build_flags = 
	-DCORE_DEBUG_LEVEL=0
	-DBOARD_HAS_PSRAM
	-mfix-esp32-psram-cache-issue
	-DBUDDY_PIO_ENV=\"m5paper\"
build_src_filter = -<*> +<ble_bridge.cpp> +<paper/>
lib_deps = 
	m5stack/M5EPD @ ^0.1.5
	bblanchon/ArduinoJson @ ^7.0.0
platform_packages = platformio/tool-esptoolpy@^2.41100.0

[env:m5paper_s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
extra_scripts = pre:tools/patch_m5epd.py
board_build.filesystem = littlefs
board_build.partitions = partitions-m5paper.csv
board_build.f_cpu = 240000000L
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
build_flags = 
	-DCORE_DEBUG_LEVEL=0
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DBUDDY_DEVICE_LABEL=\"ESP32-S3\"
	-DBUDDY_PIO_ENV=\"m5paper_s3\"
build_src_filter = -<*> +<ble_bridge.cpp> +<paper/>
lib_deps = 
	m5stack/M5EPD @ ^0.1.5
	bblanchon/ArduinoJson @ ^7.0.0
platform_packages = platformio/tool-esptoolpy@^2.41100.0

[env:papers3]
platform = espressif32
board = esp32-s3-devkitm-1
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
board_build.partitions = partitions-m5paper.csv
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.arduino.memory_type = qio_opi
build_flags =
	-DESP32S3
	-DBOARD_HAS_PSRAM
	-DCORE_DEBUG_LEVEL=0
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DARDUINO_USB_MODE=1
	-DBUDDY_DEVICE_LABEL=\"PaperS3\"
	-DBUDDY_PIO_ENV=\"papers3\"
	-DBUDDY_TARGET_PAPERS3=1
	-DBUDDY_LANDSCAPE=1
build_src_filter = -<*> +<ble_bridge.cpp> +<paper/>
lib_deps =
	https://github.com/vroland/epdiy.git#d84d26ebebd780c4c9d4218d76fbe2727ee42b47
	https://github.com/m5stack/M5Unified
	bblanchon/ArduinoJson @ ^7.0.0
platform_packages = platformio/tool-esptoolpy@^2.41100.0
